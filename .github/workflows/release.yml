name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64  go build -o codegen-linux-amd64   ./cmd/codegen
          GOOS=linux   GOARCH=arm64  go build -o codegen-linux-arm64   ./cmd/codegen
          GOOS=darwin  GOARCH=amd64  go build -o codegen-darwin-amd64  ./cmd/codegen
          GOOS=darwin  GOARCH=arm64  go build -o codegen-darwin-arm64  ./cmd/codegen
          GOOS=windows GOARCH=amd64  go build -o codegen-windows.exe   ./cmd/codegen

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            codegen-linux-amd64
            codegen-linux-arm64
            codegen-darwin-amd64
            codegen-darwin-arm64
            codegen-windows.exe
