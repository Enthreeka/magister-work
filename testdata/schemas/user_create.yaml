version: "1"
module: github.com/example/app
domain: user

transport:
  framework: gin
  method: POST
  url: /api/v1/users

input:
  - name: name
    type: string
    source: body
    required: true
  - name: email
    type: string
    source: body
    required: true

output:
  - name: id
    type: uuid
  - name: created_at
    type: time.Time

repository:
  strategy: native
  driver: pgx
  table: users
  schema: public
  operation: insert
  fields: [name, email]

ai_provider:
  name: anthropic
  model: claude-opus-4-6

service:
  description: >
    Создать нового пользователя. Проверить уникальность email —
    если пользователь с таким email уже существует, вернуть ErrUserDomain.
    После успешного создания вызвать s.repo.Create и вернуть результат.

generate:
  layers:
    - domain
    - repository
    - service
    - handler
  output_dir: testdata/output/{{.Domain}}
